;
;   POLYBAR - CINNAMON DOCK (PROFESSIONAL BUILD)
;
;==========================================================

;==========================================================
; COLORS
;==========================================================

[colors]

background = #B8202430
foreground = #CDD6F4

rofi = #89B4FA
kitty = #A6E3A1
firefox = #F38BA8
discord = #CBA6F7
files = #F9E2AF

cpu = #94E2D5
memory = #FAB387
volume = #89DCEB
network = #74C7EC
battery = #A6E3A1
clock = #CDD6F4

[bar/main]

width = 100%
height = 32

offset-x = 0
offset-y = 0

radius = 0

fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
border-size = 0

padding-left = 4
padding-right = 4
module-margin = 2

;================ FONTS =================
font-0 = "JetBrainsMono Nerd Font:size=11;3"
font-1 = "JetBrainsMono Nerd Font:size=10;2"
font-2 = "Noto Color Emoji:size=10;2"

;================ MODULES =================
modules-left = rofi kitty firefox discord files spacer running_apps
modules-center = date
modules-right = cpu memory pulseaudio network battery tray

;================ WM BEHAVIOR =================
wm-restack = generic
override-redirect = false
enable-ipc = true

cursor-click = pointer
cursor-scroll = ns-resize


;==========================================================
;                   LAUNCHERS (DOCK STYLE)
;==========================================================

[module/rofi]
type = custom/text

format = <label>

format-foreground = ${colors.rofi}

label = ůį£≠

click-left = ~/.config/rofi/menu.sh

; This part depends on your PC, so it is recommended to adjust the settings a bit to avoid any issues.

[module/kitty]
type = custom/script

exec = ~/.config/polybar/scripts/state_app.sh "%{F#A6E3A1}Óěē%{F-}" "kitty"

interval = 1

click-left = ~/.config/polybar/scripts/dock.sh kitty kitty.kitty
click-right = ~/.config/polybar/scripts/icon_menu.sh kitty


[module/firefox]
type = custom/script

exec = ~/.config/polybar/scripts/state_app.sh "%{F#F38BA8}ÔČ©%{F-}" "firefox"

interval = 1

click-left = ~/.config/polybar/scripts/dock.sh firefox Navigator.firefox
click-right = ~/.config/polybar/scripts/icon_menu.sh firefox


[module/discord]
type = custom/script

exec = ~/.config/polybar/scripts/state_app.sh "%{F#CBA6F7}ÔáŅ%{F-}" "discord"

interval = 1

click-left = ~/.config/polybar/scripts/dock.sh /var/lib/flatpak/exports/bin/com.discordapp.Discord Discord
click-right = ~/.config/polybar/scripts/icon_menu.sh discord


[module/files]
type = custom/script

exec = ~/.config/polybar/scripts/state_app.sh "%{F#F9E2AF}ůįČč%{F-}" "nemo"

interval = 1

click-left = ~/.config/polybar/scripts/dock.sh nemo nemo.Nemo
click-right = ~/.config/polybar/scripts/icon_menu.sh nemo

[module/spacer]
type = custom/text

format = "   "

[module/running_apps]
type = custom/script

exec = ~/.config/polybar/scripts/running_apps.py

tail = true

format-padding = 1


;==========================================================
;                   CLOCK
;==========================================================

[module/date]
type = internal/date
interval = 1

time = %H:%M
label = "ÔÄó %time%"

;==========================================================
;                   SYSTEM
;==========================================================

[module/cpu]
type = internal/cpu
interval = 2
label = "%{F#94E2D5}Ôčõ%{F-} %percentage%%"


[module/memory]
type = internal/memory
interval = 3
label = "%{F#FAB387}ÓŅÖ%{F-} %percentage_used%%"


[module/pulseaudio]
type = internal/pulseaudio
label-volume = "%{F#89DCEB}ÔÄ®%{F-} %percentage%%"
label-muted = "%{F#F38BA8}ůįĚü%{F-} Muted"


;==========================================================
;                   NETWORK (WITH MENU)
;==========================================================

[module/network]
type = internal/network
interface-type = wireless

label-connected = "%{F#74C7EC}Ôáę%{F-} %signal%%"
label-disconnected = "%{F#F38BA8}ůįĖ™%{F-} Offline"

click-left = ~/.config/polybar/scripts/netmenu.sh


;==========================================================
;                   BATTERY (SAFE)
;==========================================================

[module/battery]
type = internal/battery

battery = BAT1
adapter = AC

full-at = 99

label-charging = "%{F#A6E3A1}Ôá¶%{F-} %percentage%%"
label-discharging = "%{F#F9E2AF}ÔČā%{F-} %percentage%%"
label-full = "%{F#A6E3A1}ÔČÄ%{F-} Full"


;==========================================================
;                   SYSTEM TRAY
;==========================================================

[module/tray]
type = internal/tray
tray-size = 14
